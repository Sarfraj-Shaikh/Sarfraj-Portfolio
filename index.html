<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- =============== WEBSITE META DATA =============== -->
    <title>Sarfraj Shaikh</title>

    <meta name="description"
        content="Sarfraj Shaikh — Full-stack developer specializing in modern web applications, React, Node.js, and digital experiences.">

    <meta name="keywords"
        content="Sarfraj Shaikh,Sahil Portfolio,Full Stack Developer,Web Developer,MERN Developer,React Developer,Node.js Developer,Frontend Developer,Backend Developer,Software Engineer">

    <link rel="shortcut icon" href="./assets/img/sarfraj.webp" type="image/x-icon">

    <!-- =============== AUTHOR META DATA =============== -->
    <meta name="author" content="Sarfraj Shaikh">
    <meta name="publisher" content="Sarfraj Shaikh">
    <meta name="creator" content="Sarfraj Shaikh">

    <!-- =============== CSS FILE =============== -->
    <link rel="stylesheet" href="./assets/files/css/common.css">
    <link rel="stylesheet" href="./assets/files/css/style.css">

    <!-- =============== JS FILE =============== -->
    <script type="module" src="./assets/files/js/common.js" defer></script>
    <script src="./assets/files/js/main.js" defer></script>

    <!-- =============== ICON CDN =============== -->
    <link rel="stylesheet" href="./assets/files/css/icons/remixicon.css">
    <link rel="stylesheet" href="./assets/files/css/icons/font-awesome-icon.css">

    <!-- =============== AOS & ANIMATE CDN =============== -->
    <link rel="stylesheet" href="./assets/files/css/animation/animate.min.css">
    <script src="./assets/files/js/animation/aos.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

</head>

<body>

    <!-- =============== LOADER =============== -->
    <div class="page-loader" id="pageLoader">
        <div class="dot-spinner">
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
            <div class="dot-spinner__dot"></div>
        </div>
    </div>

    <!-- =============== NO NETWORK =============== -->
    <div class="no-internet" id="noInternet">
        <div class="no-internet-card">

            <div class="icon-circle">
                <img src="./assets/img/icons/no-network-red.png" class="no-network" alt="No Internet">
            </div>

            <h2>No Internet</h2>
            <p>
                You're offline. Please check your Wi-Fi or mobile data connection.
            </p>

            <div class="btn-group">
                <button class="retry-btn" onclick="location.reload()">
                    <img src="./assets/img/icons/refresh-white.png" class="no-net-icon" alt="Refresh"> Retry
                </button>

                <!-- <button class="settings-btn">
                    <i class="ri-settings-3-line"></i> Settings
                </button> -->
            </div>

            <span class="hint">
                Waiting for network...
            </span>

        </div>
    </div>

    <!-- =============== NAVBAR =============== -->
    <nav class="navbar">

        <header class="head">

            <div class="web-head">
                <img src="./assets/img/sarfraj.webp" id="mainImg" alt="Sarfraj Shaikh">
                <p>Mo Sarfraj Shaikh</p>
            </div>

            <div class="right-header">

                <div class="search-box">
                    <i class="ri-search-line"></i>
                    <p>Type <span>Shift + /</span> To Search</p>
                </div>

                <div class="divider">
                    
                </div>

                <div class="theme-icon">
                    <i class="ri-moon-line"></i>
                </div>

                <div class="menu-icon">
                    <i class="ri-menu-line"></i>
                </div>
            </div>

        </header>

    </nav>

</body>

</html>
